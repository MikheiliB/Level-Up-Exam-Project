<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover</title>
<link rel="stylesheet" href="./css/main.css">
</head>

<body>

<main class="discover-container">

<h1 class="search-main-tittl">Recent searches</h1>

<section class="recent-searches">
    <figure class="searches-artist">
        <img src="./assets/searchimgs/recentsearchesimg1.png">
        <figcaption>Daft Punk</figcaption>
    </figure>

    <figure class="searches-artist">
        <img src="./assets/searchimgs/resentsearchesimg2.png">
        <figcaption>David Bowie</figcaption>
    </figure>

    <figure class="searches-artist-third">
            <img src="./assets/searchimgs/resentsearchesimg3.png">
            <div class="artist-background"></div>
            <figcaption class="artist-text">Black Holes...</figcaption>
            <span>Muse</span>
    </figure>

</section>
    <section class="search-wrapper">
        <div class="search-bar">
            <input type="text" placeholder="What do you want to play?" class="search-input">
            <img src="./assets/searchimgs/searchsvg.svg" alt="Search" class="icon">
            <img src="./assets/searchimgs/camerasvg.svg" alt="Camera" class="icon-camera">
        </div>     
    </section>

    <h1 class="search-main-tittl">Browse all</h1>
    <h2 class="section-title">Discover</h2>

        <section class="discover-cards-wrapper">
                <article class="card blue">
                    <h3 class="card-title">Made For You</h3>
                    <img src="./assets/searchimgs/discoverimg1.png" class="card-img" alt="Made for you">  
                </article>
                <article class="card orange">
                    <h3 class="card-title">New Releases</h3>
                    <img src="./assets/searchimgs/discoverimp2.png" class="card-img" alt="New releases"> 
                </article>
                <article class="card navy"> 
                    <h3 class="card-title">Spotify Classics</h3>
                    <img src="./assets/searchimgs/discoverimg3.png" class="card-img" alt="Spotify classics"> 
                </article>
                <article class="card purple">
                    <h3 class="card-title">Charts</h3>
                    <img src="./assets/searchimgs/dicoverimg4.png" class="card-img" alt="Charts"> 
                </article>
                <article class="card pink">
                    <h3 class="card-title">Trending</h3>
                    <img src="./assets/searchimgs/discoverimg5.png" class="card-img" alt="Trending"> 
                </article>
                <article class="card violet">
                    <h3 class="card-title">Discover</h3>
                    <img src="./assets/searchimgs/discoverimg6.png" class="card-img" alt="Discover"> 
                </article>
                <article class="card gray">
                    <h3 class="card-title">Spotify Singles</h3>
                    <img src="./assets/searchimgs/discoverimg7.png" class="card-img" alt="Spotify singles"> 
                </article>
                <article class="card gold">
                    <h3 class="card-title">Decades</h3>
                    <img src="./assets/searchimgs/discoverimg8.png" class="card-img" alt="Decades"> 
                </article>
        </section>

        <h2 class="section-title">Genres</h2>

        <section class="genre-cards-wrapper">
            <article class="card green">
                <h3 class="card-title">Pop</h3>
                <img src="./assets/searchimgs/genresimg1.png" class="card-img" alt="Made for you"> 
            </article>
            <article class="card orange2">
                <h3 class="card-title">Country</h3>
                <img src="./assets/searchimgs/genresimg2.png" class="card-img" alt="Country"> 
            </article>
            <article class="card brown">
                <h3 class="card-title">Hip-Hop</h3>
                <img src="./assets/searchimgs/genresimg3.png" class="card-img" alt="Hip-Hop"> 
            </article>
            <article class="card teal">
                <h3 class="card-title">Rock</h3>
                <img src="./assets/searchimgs/genresimg4.png" class="card-img" alt="Rock"> 
            </article>
            <article class="card red">
                <h3 class="card-title">New Releases</h3>
                <img src="./assets/searchimgs/genresimg5.png" class="card-img" alt="New releases"> 
            </article>
            <article class="card darkblue">
                <h3 class="card-title">Punk</h3>
                <img src="./assets/searchimgs/genresimg6.png" class="card-img" alt="Punk"> 
            </article>
            <article class="card red2">
                <h3 class="card-title">Metal</h3>
                <img src="./assets/searchimgs/genresimg7.png" class="card-img" alt="Metal"> 
            </article>
            <article class="card sky">
                <h3 class="card-title">Instrumental</h3>
                <img src="./assets/searchimgs/genresimg8.png" class="card-img" alt="Instrumental"> 
            </article>
        </section>
</main>
</body>
</html>
